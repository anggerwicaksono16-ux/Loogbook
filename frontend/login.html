    <div class="org-name">KSOP Utama Makassar</div>
    <div class="card-title">Selamat Datang 👋</div>
    <div class="card-sub">Login ke E-Logbook  </div>
  </div>

  <!-- Body -->
  <div class="card-body">

    <span class="role-lbl">Pilih Peran</span>
    <div class="roles">
      <div class="role on" onclick="pickRole(this)">
        <span class="role-icon">⚓</span>
        <div class="role-name">Operator</div>
      </div>
      <div class="role" onclick="pickRole(this)">
        <span class="role-icon">🛡️</span>
        <div class="role-name">Admin</div>
      </div>
    </div>

    <div class="err" id="err-msg"></div>

    <!-- Email -->
    <div class="field">
      <div class="field-row">
        <span class="f-lbl">Email</span>
      </div>
      <div class="iw">
        <input type="text" id="email" placeholder="nama@ksop-makassar.go.id" autocomplete="username"/>
        <svg class="ico" viewBox="0 0 24 24">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="M2 7l10 7 10-7"/>
        </svg>
      </div>
    </div>

    <!-- Password -->
    <div class="field">
      <div class="field-row">
        <span class="f-lbl">Kata Sandi</span>
      </div>
      <div class="iw">
        <input type="password" id="pwd" placeholder="••••••••" autocomplete="current-password"/>
        <button class="eye" type="button" onclick="togglePwd()">
          <svg viewBox="0 0 24 24">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
        <svg class="ico" viewBox="0 0 24 24">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
      </div>
    </div>

    <!-- Remember -->
    <div class="mem-row">
      <label class="mem">
        <input type="checkbox" id="rem"/>
        <span>Ingat saya selama 30 hari</span>
      </label>
    </div>

    <!-- Login -->
    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      <span id="btnTxt">Masuk ke Dashboard</span>
    </button>

    <!-- Divider -->

    <!-- Register -->

  </div>

  <!-- Footer -->
  <div class="card-footer">
    <div class="secure">
      <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      SSL 256-bit
    </div>
    <div class="foot-right">
      <div class="live-dot"></div>
      <div class="foot-clock" id="clock">--:--:--</div>
    </div>
  </div>

</div>

<!-- Toast -->
<div id="toast">
  <span class="tick">✓</span>
  <span id="toast-msg">Login berhasil! Mengalihkan…</span>
</div>

<script>
  function updateClock() {
    const t = new Date().toLocaleTimeString('id-ID', { hour12: false });
    const el = document.getElementById('clock');
    if (el) el.textContent = t;
  }
  setInterval(updateClock, 1000);
  updateClock();

  function pickRole(el) {
    document.querySelectorAll('.role').forEach(r => r.classList.remove('on'));
    el.classList.add('on');

    const role    = el.querySelector('.role-name').textContent.trim();
    const emailEl = document.getElementById('email');
    const lbl     = document.querySelector('.f-lbl');

    if (role === 'Admin') {
      emailEl.placeholder = 'admin';
      emailEl.type        = 'text';
      if (lbl) lbl.textContent = 'Username';
    } else {
      emailEl.placeholder = 'nama@ksop-makassar.go.id';
      emailEl.type        = 'text';
      if (lbl) lbl.textContent = 'Email';
    }
  }

  function togglePwd() {
    const inp = document.getElementById('pwd');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  // ─── Kredensial Admin (hardcoded) ───────────────────────────
  const ADMIN_USER = 'admin';
  const ADMIN_PASS = 'admin123';
  // ─────────────────────────────────────────────────────────────

  function getSelectedRole() {
    const active = document.querySelector('.role.on .role-name');
    return active ? active.textContent.trim() : 'Operator';
  }

  function doLogin() {
    const emailVal = document.getElementById('email').value.trim();
    const pwd      = document.getElementById('pwd').value;
    const err      = document.getElementById('err-msg');
    const role     = getSelectedRole();

    if (!emailVal || !pwd) {
      err.textContent = '⚠ Username/Email dan kata sandi wajib diisi.';
      err.classList.add('show');
      return;
    }
    err.classList.remove('show');
    document.getElementById('btnTxt').textContent = 'Memproses…';
    document.getElementById('pbar').style.width = '70%';

    // ── Login Admin (lokal, tanpa Firebase) ──
    if (role === 'Admin') {
      if (emailVal === ADMIN_USER && pwd === ADMIN_PASS) {
        // Simpan info admin ke sessionStorage SEBELUM redirect
        sessionStorage.setItem('user_uid',   'admin-local');
        sessionStorage.setItem('user_name',  'Administrator');
        sessionStorage.setItem('user_email', 'admin@ksop-makassar.go.id');
        sessionStorage.setItem('user_photo', '');
        sessionStorage.setItem('user_role',  'Admin');
        simulateLogin();
      } else {
        document.getElementById('pbar').style.width = '0%';
        document.getElementById('btnTxt').textContent = 'Masuk ke Dashboard';
        err.textContent = '⚠ Username atau kata sandi Admin salah.';
        err.classList.add('show');
        setTimeout(() => err.classList.remove('show'), 5000);
      }
      return;
    }

    // ── Login Operator (via Firebase) ──
    sessionStorage.setItem('user_role', 'Operator');
    if (typeof window.doLoginFirebase === 'function') {
      window.doLoginFirebase(emailVal, pwd);
    } else {
      // Firebase belum siap — coba lagi setelah 500ms
      setTimeout(() => {
        if (typeof window.doLoginFirebase === 'function') {
          window.doLoginFirebase(emailVal, pwd);
        } else {
          err.textContent = '⚠ Koneksi Firebase belum siap. Refresh halaman.';
          err.classList.add('show');
          document.getElementById('pbar').style.width = '0%';
          document.getElementById('btnTxt').textContent = 'Masuk ke Dashboard';
        }
      }, 500);
    }
  }

  function simulateLogin() {
    const pbar     = document.getElementById('pbar');
    const btnTxt   = document.getElementById('btnTxt');
    const toast    = document.getElementById('toast');
    const toastMsg = document.getElementById('toast-msg');

    setTimeout(() => {
      if (pbar)   pbar.style.width = '100%';
      if (btnTxt) btnTxt.textContent = 'Berhasil! ✓';

      const name = sessionStorage.getItem('user_name') || 'Administrator';
      if (toastMsg) toastMsg.textContent = `Selamat datang, ${name}! Mengalihkan ke Dashboard…`;
      if (toast)    toast.classList.add('show');

      setTimeout(() => {
        window.location.href = window.location.href.replace(/[^/]*$/, '') + 'index.html';
      }, 1500);
    }, 800);
  }

  // Fungsi ini dipanggil dari script2.js (Firebase) saat login berhasil
  function onLoginSuccess(user) {
    const pbar = document.getElementById('pbar');
    const toast = document.getElementById('toast');
    const toastMsg = document.getElementById('toast-msg');

    pbar.style.width = '100%';
    toastMsg.textContent = 'Login berhasil! Mengalihkan ke Dashboard…';
    toast.classList.add('show');

    setTimeout(() => {
      window.location.href = window.location.href.replace(/[^/]*$/, '') + 'index.html';
    }, 1500);
  }

  // Fungsi ini dipanggil dari script2.js (Firebase) saat login gagal
  function onLoginError(message) {
    const err = document.getElementById('err-msg');
    const pbar = document.getElementById('pbar');
    const btnTxt = document.getElementById('btnTxt');

    err.textContent = '⚠ ' + (message || 'Email atau kata sandi salah.');
    err.classList.add('show');
    pbar.style.width = '0%';
    btnTxt.textContent = 'Masuk ke Dashboard';
  }
</script>
<script type="module" src="script2.js"></script>

</body>
</html>
